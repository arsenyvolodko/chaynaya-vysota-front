services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://chaynaya-vysota.ru}
    container_name: chaynaya-vysota-front
    restart: unless-stopped
    ports:
      - "127.0.0.1:4200:4200"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4200/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
