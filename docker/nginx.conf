server {
    listen 4200;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip — бандл и шрифты ужимаются ощутимо. brotli не врубаем
    # (нет модуля в nginx:alpine из коробки).
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # Базовые security-заголовки.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Vite-сборка использует хешированные имена (main.HASH.js, ...HASH.css).
    # → статика кэшируется надолго и immutable.
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpe?g|gif|webp|ico|map)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # index.html — без кеша. После деплоя клиент должен сразу получить
    # новые ссылки на хешированные ассеты, иначе будет 404 на старые имена.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # SPA-fallback: любой URL без файла → отдаём index.html.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
